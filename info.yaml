# Tiny Tapeout project information
project:
  title:        "Voting ASIC — Voter ID Validation System"
  author:       "Obafisayo, Somto, Wisdom, David, Henry"
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A digital voting machine ASIC: 20-bit voter ID validation (XNOR-AND comparator tree), duplicate vote detection (8-bit voted register), 8-candidate 32-bit tally counters, and a 6-state pipeline FSM. Status, id_valid, is_duplicate, and 3-bit tally are live on output pins."
  language:     "Verilog"
  clock_hz:     50000000  # 50 MHz (CLOCK_PERIOD = 20 ns in src/config.json)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_voting_asic"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "mod01_uart_rx.v"
    - "voter_id_validator.v"
    - "duplicate_checker.v"
    - "vote_tally_counter.v"
    - "mod05_fsm.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  # ui[7:0] carries the voter ID data byte during byte-write cycles.
  # ui[2:0] also selects the candidate during VOTE_CAST state.
  ui[0]: "data_byte[0] / candidate_sel[0]"
  ui[1]: "data_byte[1] / candidate_sel[1]"
  ui[2]: "data_byte[2] / candidate_sel[2]"
  ui[3]: "data_byte[3]"
  ui[4]: "data_byte[4]"
  ui[5]: "data_byte[5]"
  ui[6]: "data_byte[6]"
  ui[7]: "data_byte[7]"

  # Outputs
  # uo[2:0] — FSM status: 000=IDLE 001=VALIDATING 010=CHECKING 011=VOTE_CAST 100=DUPLICATE 101=INVALID
  uo[0]: "status[0]"
  uo[1]: "status[1]"
  uo[2]: "status[2]"
  uo[3]: "id_valid"
  uo[4]: "is_duplicate"
  uo[5]: "tally[0]"
  uo[6]: "tally[1]"
  uo[7]: "tally[2]"

  # Bidirectional pins (all configured as inputs, uio_oe = 0)
  # byte_sel selects which portion of the 20-bit voter ID is being loaded:
  #   2'b01 = load voter_id[7:0] from ui_in
  #   2'b10 = load voter_id[15:8] from ui_in and voter_id[19:16] from uio[7:4]
  uio[0]: "byte_sel[0]"
  uio[1]: "byte_sel[1]"
  uio[2]: "byte_write"
  uio[3]: "data_ready"
  uio[4]: "voter_id[16]"
  uio[5]: "voter_id[17]"
  uio[6]: "voter_id[18]"
  uio[7]: "voter_id[19] / UART_RX"

# Do not change!
yaml_version: 6
